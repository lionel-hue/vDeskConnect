  <circle cx="330" cy="70" r="40" fill="#7C6BC4" opacity="0.08"/>
  <circle cx="70" cy="240" r="35" fill="#A99DDB" opacity="0.1"/>
  
  <!-- Person with question mark -->
  <circle cx="200" cy="100" r="30" fill="#FFFFFF" stroke="#7C6BC4" stroke-width="2"/>
  <circle cx="193" cy="93" r="4" fill="#2D2B55"/>
  <circle cx="207" cy="93" r="4" fill="#2D2B55"/>
  <path d="M193 108 Q200 115 207 108" stroke="#2D2B55" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Person body -->
  <rect x="175" y="130" width="50" height="80" rx="16" fill="#7C6BC4"/>
  
  <!-- Question mark bubble -->
  <circle cx="280" cy="80" r="25" fill="#FFFFFF" stroke="#7C6BC4" stroke-width="2"/>
  <text x="270" y="88" font-family="sans-serif" font-size="28" font-weight="bold" fill="#7C6BC4">?</text>
  
  <!-- Key floating -->
  <circle cx="100" cy="120" r="18" fill="#FFFFFF" stroke="#A99DDB" stroke-width="2"/>
  <circle cx="100" cy="120" r="7" fill="#A99DDB" opacity="0.3"/>
  <rect x="112" y="118" width="25" height="4" rx="2" fill="#A99DDB"/>
  <rect x="132" y="115" width="4" height="8" rx="1" fill="#A99DDB"/>
  
  <!-- Lock icon -->
  <rect x="100" y="200" width="40" height="35" rx="6" fill="#FFFFFF" stroke="#7C6BC4" stroke-width="2"/>
  <path d="M110 200 L110 188 Q110 180 120 180 Q130 180 130 188 L130 200" stroke="#7C6BC4" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="120" cy="218" r="5" fill="#7C6BC4" opacity="0.3"/>
  
  <!-- Decorative dots -->
  <circle cx="320" cy="180" r="6" fill="#7C6BC4" opacity="0.2"/>
  <circle cx="80" cy="260" r="5" fill="#A99DDB" opacity="0.2"/>
  <rect x="340" y="140" width="8" height="8" rx="2" fill="#7C6BC4" opacity="0.1" transform="rotate(45 344 144)"/>
