<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F0EEF7"/>
  
  <!-- Decorative -->
  <circle cx="330" cy="70" r="40" fill="#7C6BC4" opacity="0.08"/>
  <circle cx="70" cy="230" r="35" fill="#A99DDB" opacity="0.1"/>
  
  <!-- Shield with key -->
  <path d="M200 50 L130 90 L130 170 Q130 230 200 260 Q270 230 270 170 L270 90 Z" fill="#FFFFFF" stroke="#7C6BC4" stroke-width="3"/>
  <path d="M200 70 L150 100 L150 165 Q150 215 200 240 Q250 215 250 165 L250 100 Z" fill="#7C6BC4" opacity="0.1"/>
  
  <!-- Key in center -->
  <circle cx="200" cy="140" r="20" fill="#7C6BC4"/>
  <circle cx="200" cy="140" r="10" fill="#F0EEF7"/>
  <rect x="200" y="140" width="40" height="8" rx="4" fill="#7C6BC4"/>
  <rect x="230" y="135" width="8" height="14" rx="2" fill="#7C6BC4"/>
  
  <!-- Small locks around -->
  <rect x="100" cy="100" width="30" height="25" rx="4" fill="#FFFFFF" stroke="#A99DDB" stroke-width="1.5"/>
  <path d="M108 100 L108 92 Q108 86 115 86 Q122 86 122 92 L122 100" stroke="#A99DDB" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <rect x="270" y="120" width="25" height="20" rx="4" fill="#FFFFFF" stroke="#A99DDB" stroke-width="1.5"/>
  <path d="M277 120 L277 114 Q277 109 282 109 Q287 109 287 114 L287 120" stroke="#A99DDB" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <!-- Decorative -->
  <circle cx="80" cy="200" r="6" fill="#7C6BC4" opacity="0.2"/>
  <circle cx="330" cy="180" r="8" fill="#A99DDB" opacity="0.15"/>
  <rect x="340" y="220" width="6" height="6" rx="1" fill="#7C6BC4" opacity="0.1" transform="rotate(45 343 223)"/>
</svg>
