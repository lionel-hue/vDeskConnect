<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F0EEF7"/>
  
  <!-- Decorative -->
  <circle cx="80" cy="80" r="35" fill="#7C6BC4" opacity="0.08"/>
  <circle cx="330" cy="230" r="40" fill="#A99DDB" opacity="0.1"/>
  
  <!-- Mailbox -->
  <rect x="100" y="120" width="200" height="100" rx="10" fill="#FFFFFF" stroke="#7C6BC4" stroke-width="2"/>
  
  <!-- Mailbox flag -->
  <rect x="280" y="100" width="8" height="60" rx="4" fill="#7C6BC4" opacity="0.5"/>
  <rect x="280" y="100" width="30" height="12" rx="6" fill="#7C6BC4"/>
  
  <!-- Envelope going in -->
  <rect x="150" y="140" width="100" height="50" rx="6" fill="#7C6BC4" opacity="0.15"/>
  <polygon points="150,140 200,170 250,140" fill="#7C6BC4" opacity="0.3"/>
  
  <!-- Verification badge on envelope -->
  <circle cx="200" cy="165" r="12" fill="#34D399"/>
  <path d="M194 165 L198 169 L206 161" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Code digits floating -->
  <circle cx="130" cy="100" r="18" fill="#FFFFFF" stroke="#7C6BC4" stroke-width="1.5"/>
  <text x="123" y="106" font-family="monospace" font-size="16" font-weight="bold" fill="#7C6BC4">1</text>
  
  <circle cx="270" cy="90" r="18" fill="#FFFFFF" stroke="#7C6BC4" stroke-width="1.5"/>
  <text x="263" y="96" font-family="monospace" font-size="16" font-weight="bold" fill="#7C6BC4">6</text>
  
  <!-- Arrow pointing to mailbox -->
  <path d="M80 170 L100 170" stroke="#A99DDB" stroke-width="2" stroke-linecap="round"/>
  <path d="M95 165 L100 170 L95 175" stroke="#A99DDB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Decorative -->
  <circle cx="320" cy="160" r="8" fill="#7C6BC4" opacity="0.15"/>
  <circle cx="80" cy="240" r="6" fill="#A99DDB" opacity="0.2"/>
</svg>
