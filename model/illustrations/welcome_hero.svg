<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F0EEF7"/>
  
  <!-- Globe -->
  <circle cx="200" cy="140" r="80" fill="#FFFFFF" stroke="#7C6BC4" stroke-width="2"/>
  <ellipse cx="200" cy="140" rx="40" ry="80" fill="none" stroke="#7C6BC4" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="200" cy="140" rx="80" ry="40" fill="none" stroke="#7C6BC4" stroke-width="1.5" opacity="0.3"/>
  <line x1="120" y1="140" x2="280" y2="140" stroke="#7C6BC4" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Connected schools (dots on globe) -->
  <circle cx="170" cy="110" r="8" fill="#7C6BC4"/>
  <circle cx="170" cy="110" r="3" fill="#FFFFFF"/>
  
  <circle cx="230" cy="100" r="6" fill="#A99DDB"/>
  <circle cx="230" cy="100" r="2" fill="#FFFFFF"/>
  
  <circle cx="200" cy="160" r="7" fill="#34D399"/>
  <circle cx="200" cy="160" r="2.5" fill="#FFFFFF"/>
  
  <circle cx="150" cy="150" r="5" fill="#FBBF24"/>
  <circle cx="150" cy="150" r="2" fill="#FFFFFF"/>
  
  <!-- Connection lines -->
  <line x1="170" y1="110" x2="230" y2="100" stroke="#7C6BC4" stroke-width="1" opacity="0.3"/>
  <line x1="230" y1="100" x2="200" y2="160" stroke="#7C6BC4" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="160" x2="150" y2="150" stroke="#7C6BC4" stroke-width="1" opacity="0.3"/>
  
  <!-- Screens floating around -->
  <rect x="60" y="80" width="50" height="35" rx="4" fill="#FFFFFF" stroke="#7C6BC4" stroke-width="1.5"/>
  <rect x="65" y="85" width="20" height="3" rx="1.5" fill="#7C6BC4" opacity="0.4"/>
  <rect x="65" y="92" width="35" height="2" rx="1" fill="#A99DDB" opacity="0.3"/>
  <rect x="65" y="98" width="25" height="2" rx="1" fill="#A99DDB" opacity="0.3"/>
  
  <rect x="290" y="180" width="50" height="35" rx="4" fill="#FFFFFF" stroke="#7C6BC4" stroke-width="1.5"/>
  <rect x="295" y="185" width="25" height="3" rx="1.5" fill="#7C6BC4" opacity="0.4"/>
  <rect x="295" y="192" width="30" height="2" rx="1" fill="#A99DDB" opacity="0.3"/>
  <rect x="295" y="198" width="20" height="2" rx="1" fill="#A99DDB" opacity="0.3"/>
  
  <!-- Decorative -->
  <circle cx="80" cy="240" r="6" fill="#A99DDB" opacity="0.2"/>
  <circle cx="330" cy="70" r="8" fill="#7C6BC4" opacity="0.15"/>
  
  <!-- Text hint -->
  <rect x="130" y="250" width="140" height="8" rx="4" fill="#7C6BC4" opacity="0.2"/>
</svg>
