<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Decorative -->
  <circle cx="80" cy="70" r="35" fill="#7C6BC4" opacity="0.08"/>
  <circle cx="330" cy="240" r="40" fill="#A99DDB" opacity="0.1"/>
  
  <!-- Envelope -->
  <rect x="100" y="100" width="200" height="120" rx="10" fill="#FFFFFF" stroke="#7C6BC4" stroke-width="2"/>
  
  <!-- Envelope flap -->
  <polygon points="100,100 200,160 300,100" fill="#34D399" opacity="0.2"/>
  
  <!-- Flying envelope -->
  <rect x="280" y="60" width="60" height="36" rx="4" fill="#7C6BC4" opacity="0.3"/>
  <polygon points="280,60 310,78 340,60" fill="#7C6BC4" opacity="0.5"/>
  
  <!-- Trail lines -->
  <line x1="260" y1="70" x2="275" y2="70" stroke="#A99DDB" stroke-width="2" stroke-linecap="round"/>
  <line x1="250" y1="78" x2="265" y2="78" stroke="#A99DDB" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="255" y1="86" x2="270" y2="86" stroke="#A99DDB" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Big checkmark -->
  <circle cx="200" cy="150" r="35" fill="#34D399"/>
  <path d="M180 150 L192 162 L220 138" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Success dots -->
  <circle cx="100" cy="180" r="8" fill="#34D399" opacity="0.2"/>
  <circle cx="320" cy="120" r="6" fill="#34D399" opacity="0.15"/>
  <circle cx="80" cy="240" r="5" fill="#A99DDB" opacity="0.2"/>
</svg>
