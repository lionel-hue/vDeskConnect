<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F0EEF7"/>
  
  <!-- Decorative -->
  <circle cx="80" cy="70" r="35" fill="#7C6BC4" opacity="0.08"/>
  <circle cx="330" cy="240" r="40" fill="#A99DDB" opacity="0.1"/>
  
  <!-- Big checkmark circle -->
  <circle cx="200" cy="130" r="70" fill="#34D399" opacity="0.15"/>
  <circle cx="200" cy="130" r="55" fill="#34D399"/>
  
  <!-- Checkmark -->
  <path d="M170 130 L190 150 L235 105" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Celebration stars -->
  <circle cx="100" cy="80" r="8" fill="#FBBF24" opacity="0.6"/>
  <circle cx="100" cy="80" r="3" fill="#FBBF24"/>
  
  <circle cx="310" cy="90" r="6" fill="#FBBF24" opacity="0.5"/>
  <circle cx="310" cy="90" r="2" fill="#FBBF24"/>
  
  <circle cx="120" cy="200" r="5" fill="#FBBF24" opacity="0.4"/>
  <circle cx="120" cy="200" r="2" fill="#FBBF24"/>
  
  <!-- Happy face -->
  <circle cx="300" cy="180" r="20" fill="#FFFFFF" stroke="#7C6BC4" stroke-width="2"/>
  <circle cx="294" cy="175" r="3" fill="#2D2B55"/>
  <circle cx="306" cy="175" r="3" fill="#2D2B55"/>
  <path d="M294 186 Q300 192 306 186" stroke="#2D2B55" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Confetti dots -->
  <circle cx="80" cy="150" r="4" fill="#7C6BC4" opacity="0.3"/>
  <circle cx="340" cy="140" r="5" fill="#A99DDB" opacity="0.3"/>
  <rect x="350" y="200" width="6" height="6" rx="1" fill="#7C6BC4" opacity="0.15" transform="rotate(45 353 203)"/>
  
  <!-- Text hint -->
  <rect x="140" y="240" width="120" height="8" rx="4" fill="#7C6BC4" opacity="0.2"/>
</svg>
